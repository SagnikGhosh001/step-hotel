version: "3.9"

services:
  server:
    build: .
    deploy:
      replicas: 5
    environment:
      HOTEL_MONGO_URI: mongodb://mongo:27017/hoteldb
    depends_on:
      - mongo
    networks:
      - backend

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
    networks:
      - backend

  mongo:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

volumes:
  mongo_data:

networks:
  backend:
    driver: bridge