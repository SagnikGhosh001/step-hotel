worker_processes auto;

events {
    worker_connections 4096;
}

http {
    gzip on;  
    upstream backend {
        least_conn;
        server server:8080;
        keepalive 64;
    }

    server {
        listen 80;


        keepalive_timeout 65;
        keepalive_requests 1000;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }
    }
}
